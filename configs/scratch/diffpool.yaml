dataset:
  batch_size: 64
  cleaned: false
  module: datasets.mantra2d
  root: ./data/mantra2d
  seed: 2020
  use_node_attr: false
experiment:
  name: mantra-diffpool
logger:
  log_dir: mantra2d_2020
  log_interval: 10
  logger_name: csvlogger
  model_str: diffpool
model:
  hidden_channels: 64
  hidden_linear_layer: 64
  in_channels: 5
  max_num_nodes: 10
  module: models.diffpool_mesh
  normalize: false
  num_classes: 21
  use_linear_layer: false
trainer:
  epochs: 10
  lr: 0.01
